<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join ScholarScope | Global Opportunities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: #f3f4f6; }
        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 80% 20%, #1e1b4b 0%, #030712 100%); }
        .blob { position: absolute; width: 400px; height: 400px; background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(168, 85, 247, 0.15) 100%); filter: blur(80px); border-radius: 50%; z-index: -1; animation: float 15s infinite alternate; }
        @keyframes float { from { transform: translate(0,0); } to { transform: translate(-40px, 60px); } }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .input-field { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; color: white; }
        .input-field:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); outline: none; background: rgba(255, 255, 255, 0.08); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); transform: translateY(-2px); }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Modal Animation */
        #confirmModal { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; pointer-events: none; transform: scale(0.95); }
        #confirmModal.active { opacity: 1; pointer-events: auto; transform: scale(1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <div class="bg-mesh"></div>
    <div class="blob"></div>

    <div class="w-full max-w-md fade-in">
        <div class="text-center mb-8">
            <a href="index.html" class="text-2xl font-extrabold tracking-tighter">
                <span class="text-white">Scholar</span><span class="text-indigo-400">Scope</span>
            </a>
        </div>

        <div class="glass-card p-8 rounded-[2.5rem] shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold mb-2">Create Account</h1>
                <p class="text-gray-400 text-sm">Start your journey to global education</p>
            </div>

            <form id="registerForm" class="space-y-5" onsubmit="handleSignup(event)">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Full Name</label>
                    <input type="text" required placeholder="John Doe" class="input-field w-full px-5 py-3.5 rounded-xl">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Email Address</label>
                    <input type="email" required placeholder="john@example.com" class="input-field w-full px-5 py-3.5 rounded-xl">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                        <input type="password" required placeholder="••••••••" class="input-field w-full px-5 py-3.5 rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Confirm</label>
                        <input type="password" required placeholder="••••••••" class="input-field w-full px-5 py-3.5 rounded-xl text-sm">
                    </div>
                </div>

                <button type="submit" class="w-full py-4 mt-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition duration-300 btn-glow">
                    Sign Up
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-white/5 text-center">
                <p class="text-gray-400 text-sm">
                    Already have an account? 
                    <a href="login.html" class="text-indigo-400 font-bold hover:text-indigo-300 transition">Login</a>
                </p>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm">
        <div class="glass-card max-w-sm w-full p-8 rounded-[2rem] text-center border-indigo-500/30">
            <div class="w-20 h-20 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-2">Account Created!</h2>
            <p class="text-gray-400 mb-8 leading-relaxed">Welcome to the future of global academic opportunities.</p>
            <div class="space-y-3">
                <button onclick="window.location.href='login.html'" class="w-full py-3 bg-white text-indigo-900 font-bold rounded-xl hover:bg-gray-100 transition">
                    Continue to Login
                </button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000/api';

async function handleSignup(e) {
    e.preventDefault();

    const inputs = e.target.querySelectorAll('input');
    const name = inputs[0].value;
    const email = inputs[1].value;
    const password = inputs[2].value;
    const confirm = inputs[3].value;

    // Check passwords match
    if (password !== confirm) {
        alert('Passwords do not match!');
        return;
    }

    const btn = e.target.querySelector('button');
    btn.innerText = "Creating account...";
    btn.style.opacity = "0.7";
    btn.disabled = true;

    try {
        const res = await fetch(`${API}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.message);
            btn.innerText = "Sign Up";
            btn.style.opacity = "1";
            btn.disabled = false;
            return;
        }

        // Save token and user
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Show success modal
        document.getElementById('confirmModal').classList.add('active');

    } catch (err) {
        alert('Connection failed. Make sure backend is running.');
        btn.innerText = "Sign Up";
        btn.style.opacity = "1";
        btn.disabled = false;
    }
}
    </script>
</body>
</html>
